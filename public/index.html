<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💍 Wedding Fitness Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a14;--card:#1a1a2e;--card2:#13131f;--border:#252538;
  --purple:#a855f7;--purple-d:#6d28d9;--purple-deep:#3b0764;
  --green:#22c55e;--green-d:#064e3b;
  --gold:#f59e0b;--gold-d:#451a03;
  --pink:#ec4899;--pink-d:#2d1429;
  --blue:#60a5fa;--blue-d:#1b2d4e;
  --text:#e2e8f0;--muted:#94a3b8;--dim:#4b5563;
}
html{font-size:42px}
@media(min-width:768px){html{font-size:52px}}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
/* ─── LAYOUT ─── */
#app{display:flex;flex-direction:column;height:100%;max-width:768px;margin:0 auto;position:relative}
/* ─── HEADER ─── */
.hdr{background:linear-gradient(135deg,#4c1d95,#6d28d9,#a855f7);padding:14px 16px 10px;flex-shrink:0;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.06);pointer-events:none}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-size:1rem;font-weight:800;letter-spacing:-0.2px}
.hdr-sub{font-size:0.6rem;opacity:0.7;margin-top:1px}
.cd-row{display:flex;gap:6px}
.cd-box{background:rgba(0,0,0,0.25);border-radius:8px;padding:5px 8px;text-align:center;flex:1;backdrop-filter:blur(4px)}
.cd-num{font-size:1.1rem;font-weight:900;line-height:1}
.cd-lbl{font-size:0.45rem;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px;margin-top:1px}
.cd-goal{background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.3);color:#6ee7b7}
/* ─── PROFILES ─── */
.profiles{display:flex;gap:8px;padding:10px 12px;flex-shrink:0}
.pcard{flex:1;background:var(--card);border-radius:12px;padding:10px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all .2s}
.pcard.active{border-color:var(--purple);background:#26163d}
.pcard.active.v{border-color:var(--pink);background:#1a1a3a}
.p-emoji{font-size:1.2rem;margin-bottom:2px}
.p-name{font-size:0.72rem;font-weight:700}
.p-weight{font-size:0.58rem;color:var(--muted);margin-top:1px}
.p-cal{font-size:0.55rem;font-weight:600;margin-top:2px}
.pcard.active .p-cal{color:var(--purple)}
.pcard.active.v .p-cal{color:var(--pink)}
/* ─── TABS ─── */
.tabs{display:flex;background:var(--card2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:10px 6px;font-size:0.62rem;font-weight:600;color:var(--dim);border-bottom:2px solid transparent;text-align:center;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
/* ─── SCROLL BODY ─── */
.body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ─── CARDS ─── */
.card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border)}
.card-title{font-size:0.58rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);font-weight:700;margin-bottom:10px}
/* ─── PROGRESS BAR ─── */
.bar-wrap{background:var(--border);border-radius:10px;height:6px;overflow:hidden}
.bar{height:100%;border-radius:10px;transition:width .4s ease}
.bar-row{display:flex;justify-content:space-between;font-size:0.55rem;color:var(--dim);margin-top:3px}
/* ─── INPUT ROW ─── */
.inp-row{display:flex;gap:8px}
.inp-group{flex:1;display:flex;flex-direction:column;gap:4px}
.inp-label{font-size:0.58rem;color:var(--muted)}
.inp{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:0.9rem;width:100%;outline:none;font-family:inherit;transition:border-color .15s}
.inp:focus{border-color:var(--purple)}
.inp::placeholder{color:var(--dim)}
/* ─── MEAL CHECKLIST ─── */
.meal-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;-webkit-user-select:none}
.meal-item:last-child{border-bottom:none}
.m-check{width:1.8rem;height:1.8rem;border-radius:50%;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-check.done{background:var(--purple);border-color:var(--purple)}
.m-check svg{width:0.9rem;height:0.9rem}
.m-icon{font-size:1.1rem;flex-shrink:0}
.m-info{flex:1;min-width:0}
.m-name{font-size:0.78rem;font-weight:700}
.m-detail{font-size:0.6rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-kcal{font-size:0.58rem;color:var(--purple);font-weight:600;margin-top:1px}
.m-earned{font-size:0.55rem;color:var(--gold);margin-top:1px}
/* ─── WORKOUT SECTION ─── */
.wo-box{background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.wo-type-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.wo-tag{padding:2px 8px;border-radius:5px;font-size:0.58rem;font-weight:700}
.wt-gym{background:var(--purple-deep);color:#c4b5fd}
.wt-cardio{background:var(--green-d);color:#86efac}
.wt-walk{background:var(--green-d);color:#6ee7b7}
.wt-rest{background:#1a1a2a;color:var(--dim)}
.wt-together{background:var(--pink-d);color:#f9a8d4}
.wt-plan{background:var(--blue-d);color:var(--blue)}
.wo-exercises{font-size:0.65rem;color:var(--muted);line-height:1.6}
.wo-exercises b{color:var(--text)}
.wo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wo-btn{padding:11px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text);font-size:0.75rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.wo-btn.done-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.wo-btn.skip-btn.active{background:#ef4444;border-color:#ef4444;color:#fff}
/* ─── SUPPLEMENTS ─── */
.supp-item{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none}
/* ─── MACRO GRID ─── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mc{background:var(--card2);border-radius:10px;padding:9px 4px;text-align:center}
.mc-val{font-size:1rem;font-weight:900}
.mc-lbl{font-size:0.5rem;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
/* ─── MEAL PLAN CARDS ─── */
.mp-item{padding:11px 0;border-bottom:1px solid var(--border)}
.mp-item:last-child{border-bottom:none}
.mp-name{font-size:0.75rem;font-weight:700;color:var(--purple);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.mp-name.v{color:var(--pink)}
.mp-foods{font-size:0.7rem;color:var(--muted);line-height:1.6}
.mp-portion{font-size:0.65rem;color:var(--text);font-weight:600}
.mp-macros{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.mp-badge{padding:2px 7px;border-radius:5px;font-size:0.55rem;font-weight:600}
.mp-kcal{background:var(--purple-deep);color:#c4b5fd}
.mp-pro{background:var(--blue-d);color:var(--blue)}
.mp-car{background:var(--gold-d);color:var(--gold)}
.mp-fat{background:var(--pink-d);color:var(--pink)}
/* ─── WEEK GRID ─── */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wk-cell{text-align:center}
.wk-lbl{font-size:0.5rem;color:var(--dim);margin-bottom:3px}
.wk-dot{width:2.2rem;height:2.2rem;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;background:var(--border);color:var(--dim)}
.wk-dot.gym{background:var(--purple-deep);color:#c4b5fd}
.wk-dot.walk{background:var(--green-d);color:#6ee7b7}
.wk-dot.plan{background:var(--blue-d);color:var(--blue)}
.wk-dot.rest{background:#1a1a2a;color:var(--dim)}
.wk-dot.today-ring{box-shadow:0 0 0 2px var(--purple)}
.wk-dot.logged{background:var(--green);color:#fff}
.wk-dot.missed{background:#7f1d1d;color:#fca5a5}
/* ─── PROGRESS STATS ─── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--card2);border-radius:10px;padding:10px;text-align:center}
.stat-val{font-size:1.1rem;font-weight:900}
.stat-lbl{font-size:0.5rem;color:var(--dim);margin-top:2px}
/* ─── CHART ─── */
.chart-wrap{position:relative;width:100%;height:8rem}
canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}
/* ─── US TAB ─── */
.us-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.us-card{background:var(--card2);border-radius:12px;padding:12px;text-align:center}
.us-avatar{font-size:1.5rem;margin-bottom:4px}
.us-name{font-size:0.65rem;font-weight:700;margin-bottom:8px}
.us-row{display:flex;justify-content:space-between;align-items:center;font-size:0.6rem;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border)}
.us-row:last-child{border-bottom:none}
.us-badge{font-size:0.55rem;font-weight:700;padding:2px 6px;border-radius:5px}
.ub-green{background:var(--green-d);color:#6ee7b7}
.ub-purple{background:var(--purple-deep);color:#c4b5fd}
.ub-gray{background:#1a1a2a;color:var(--dim)}
.ub-gold{background:var(--gold-d);color:var(--gold)}
/* ─── MOTIVATION ─── */
.motivation{background:linear-gradient(135deg,#3b0764,#1b2d4e);border-radius:12px;padding:14px;text-align:center;font-size:0.72rem;font-style:italic;color:#d8b4fe;line-height:1.6;border:1px solid #5b21b6}
/* ─── SAVE BTN ─── */
.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--purple-d),var(--purple));border:none;border-radius:12px;color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.save-btn:hover{opacity:.9}
/* ─── LEGEND ─── */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:0.58rem;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:50%}
/* ─── TOAST ─── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:0.78rem;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}
/* ─── COMPLIANCE BARS ─── */
.comp-row{margin-bottom:8px}
.comp-head{display:flex;justify-content:space-between;font-size:0.65rem;color:var(--muted);margin-bottom:4px}
.comp-head span:last-child{font-weight:700;color:var(--text)}
/* ─── SEPARATOR ─── */
.sep{height:1px;background:var(--border);margin:4px 0}
/* ─── CALLOUT ─── */
.callout{background:var(--card2);border-radius:10px;padding:10px 12px;border-left:3px solid var(--gold);font-size:0.68rem;color:var(--muted);line-height:1.5}
.callout b{color:var(--gold)}
/* ─── SUPP TAGS ─── */
.supp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.supp-tag{background:var(--purple-deep);color:#c4b5fd;border-radius:6px;padding:3px 8px;font-size:0.58rem}
/* ─── WEEKLY FULL TABLE ─── */
.full-week{display:flex;flex-direction:column;gap:6px}
.fw-row{background:var(--card2);border-radius:10px;padding:10px 12px}
.fw-day{font-size:0.6rem;font-weight:700;color:var(--dim);margin-bottom:4px}
.fw-detail{font-size:0.68rem;color:var(--muted);line-height:1.5}
.fw-detail b{color:var(--text)}
/* ─── SYNC STATUS ─── */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s}
.sync-dot.syncing{background:var(--gold);animation:blink 1s infinite}
.sync-dot.synced{background:var(--green)}
.sync-dot.error{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* ─── RESPONSIVE ─── */
@media(min-width:768px){
  #app{border-left:1px solid var(--border);border-right:1px solid var(--border)}
}
</style>
</head>

</div>

function store() {
  try { return JSON.parse(localStorage.getItem('wf26') || '{"mayowa":{"logs":{}},"vanessa":{"logs":{}}}'); }
  catch { return {mayowa:{logs:{}},vanessa:{logs:{}}}; }
}
function save(d) { try { localStorage.setItem('wf26', JSON.stringify(d)); } catch(e){} }
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getLog(profile, key) {
  const s = store();
  return s[profile]?.logs?.[key] || { weight:null, steps:null, water:null, meals:{}, workout:null, workoutType:'', supps:false };
}
function saveLog(profile, key, log) {
  const s = store();
  if (!s[profile]) s[profile] = {logs:{}};
  s[profile].logs[key] = log;
  save(s);
  syncToServer(profile, key, log);
}

function updateCountdown() {

function drawChart(weights, start, goal) {
  const canvas = document.getElementById('wt-chart');
  if (!canvas) return;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const pad = {t:10, r:40, b:20, l:10};
  const aw = W - pad.l - pad.r, ah = H - pad.t - pad.b;
  const allVals = [...weights, goal, start];
  const minW = Math.min(...allVals) - 2;
  const maxW = Math.max(...allVals) + 2;
  const rng = maxW - minW;

  const toX = i => pad.l + (i / (weights.length-1)) * aw;
  const toY = v => pad.t + ah * (1 - (v - minW) / rng);

  // Grid lines
  ctx.strokeStyle = '#252538'; ctx.lineWidth = 1;
  for (let i=0; i<=4; i++) {
    const y = pad.t + ah*(i/4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+aw, y); ctx.stroke();
    const val = (maxW - (rng*i/4)).toFixed(0);
    ctx.fillStyle = '#4b5563'; ctx.font = `${10*window.devicePixelRatio/window.devicePixelRatio}px sans-serif`;
    ctx.fillText(val, pad.l+aw+4, y+4);
  }

  // Goal line
  const goalY = toY(goal);
  ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, goalY); ctx.lineTo(pad.l+aw, goalY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#22c55e'; ctx.font = '10px sans-serif';
  ctx.fillText(`Goal ${goal}`, pad.l+aw+4, goalY+4);

  // Fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ah);
  grad.addColorStop(0, 'rgba(168,85,247,0.3)'); grad.addColorStop(1, 'rgba(168,85,247,0)');
  ctx.beginPath();
  weights.forEach((w,i) => i===0 ? ctx.moveTo(toX(i),toY(w)) : ctx.lineTo(toX(i),toY(w)));
  ctx.lineTo(toX(weights.length-1), pad.t+ah); ctx.lineTo(toX(0), pad.t+ah); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle='#a855f7'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  weights.forEach((w,i) => i===0 ? ctx.moveTo(toX(i),toY(w)) : ctx.lineTo(toX(i),toY(w)));
  ctx.stroke();

  // Dots
  weights.forEach((w,i) => {
    const x=toX(i), y=toY(w);
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle='#a855f7'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fillStyle='#13131f'; ctx.fill();
  });
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function card(html) {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = html;
  return d;
}

function toggleMeal(key) {
  const log = getLog(cur, todayKey());
  log.meals[key] = !log.meals[key];
  saveLog(cur, todayKey(), log);
  render();
}

function showEarnedMsg() {
  toast('Complete all 4 meals + workout to earn dessert! 🔒');
}

function toggleSupps() {
  const log = getLog(cur, todayKey());
  log.supps = !log.supps;
  saveLog(cur, todayKey(), log);
  render();
}

function setWorkout(done) {
  const log = getLog(cur, todayKey());
  log.workout = done;
  const wo = getTodayWorkout();
  if (wo) log.workoutType = wo.label;
  saveLog(cur, todayKey(), log);
  render();
}

function autosave() {
  const log = getLog(cur, todayKey());
  const w = document.getElementById('inp-weight')?.value;
  const st = document.getElementById('inp-steps')?.value;
  const wa = document.getElementById('inp-water')?.value;
  if (w !== undefined) log.weight = w ? parseFloat(w) : null;
  if (st !== undefined) log.steps = st ? parseInt(st) : null;
  if (wa !== undefined) log.water = wa ? parseFloat(wa) : null;
  saveLog(cur, todayKey(), log);
  updateWeightDisplay();
}

function saveToday() {
  autosave();
  toast('Saved! 💪');
}

function updateWeightDisplay() {
  const s = store();
  ['mayowa','vanessa'].forEach(p => {
    const logs = s[p]?.logs || {};
    const weights = Object.values(logs).map(l=>l.weight).filter(Boolean);
    const cur_w = weights.length ? weights[weights.length-1] : PROFILES[p].startWeight;
    const el = document.getElementById(`${p==='mayowa'?'m':'v'}-weight-display`);
    if (el) el.textContent = `${cur_w} lbs`;
  });
}

function calcStreak(logs) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const l = logs[key];
    if (l && (l.weight || Object.values(l.meals||{}).some(Boolean) || l.workout !== null)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else { break; }
  }
  return streak;
}

function getThisWeekLogs(logs) {
  const result = [];
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(today.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    result.push(logs[key] || null);
  }
  return result;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ════════════════════════════════════════════
// SYNC — Google Sheets backend
// ════════════════════════════════════════════
let serverAvailable = true;

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  if (dot) dot.className = 'sync-dot ' + status;
}

async function syncFromServer() {
  setSyncStatus('syncing');
  try {
    const res = await fetch('/api/logs', { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    // Merge: server is source of truth, local fills any gaps
    const local = store();
    ['mayowa','vanessa'].forEach(p => {
      if (data[p]?.logs) {
        if (!local[p]) local[p] = { logs: {} };
        Object.assign(local[p].logs, data[p].logs);
      }
    });
    save(local);
    serverAvailable = true;
    setSyncStatus('synced');
  } catch(e) {
    serverAvailable = false;
    setSyncStatus('error');
  } finally {
    render();
  }
}

async function syncToServer(profile, dateKey, log) {
  if (!serverAvailable) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch('/api/logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: dateKey, profile, log }),
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) throw new Error('Server error');
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
  }
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
updateCountdown();
setInterval(updateCountdown, 60000);
syncFromServer(); // fetches from Sheets, then calls render()
